<style>
  #payment-onboarding {
    background: #080c14;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    color: #ffffff;
    padding: 20px;
  }

  .onboarding-card {
    background: #0f1624;
    border: 1px solid rgba(255, 255, 255, 0.05);
    width: 100%;
    max-width: 440px;
    padding: 48px;
    border-radius: 32px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
  }

  .pay-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0.8;
  }

  .pay-headline {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 24px;
    line-height: 1.2;
  }

  .benefit-list {
    text-align: left;
    margin: 32px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .benefit-item {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #94a3b8;
    font-size: 0.95rem;
  }

  .benefit-item svg {
    color: #3b82f6;
    flex-shrink: 0;
  }

  .input-group {
    margin-bottom: 20px;
    text-align: left;
  }

  .input-label {
    display: block;
    font-size: 0.85rem;
    color: #64748b;
    margin-bottom: 8px;
    margin-left: 4px;
  }

  .pay-input {
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 14px 18px;
    border-radius: 12px;
    color: white;
    font-size: 1rem;
    transition: border-color 0.2s;
  }

  .pay-input:focus {
    outline: none;
    border-color: #3b82f6;
  }

  /* Stripe-style Mock Element */
  .stripe-mock {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 14px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .pay-btn {
    width: 100%;
    background: #3b82f6;
    color: white;
    padding: 16px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 1rem;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
  }

  .pay-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
  }

  .trust-line {
    margin-top: 24px;
    font-size: 0.85rem;
    color: #475569;
  }
</style>

<div id="payment-onboarding">
  <div class="onboarding-card">
    <div class="pay-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15.05 5A5 5 0 0 1 19 8.95M15.05 1A9 9 0 0 1 23 8.94m-1 7.98v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.72 9.72 19.86 19.86 0 0 1 1.64 1H4.7a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L5.77 8.08a16 16 0 0 0 6.15 6.15l1.35-1.35a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 20 15.92z"/></svg>
      BESTCALLS
    </div>

    <h1 class="pay-headline">Start Calling.<br><span style="color: #3b82f6;">Rs1000/month.</span></h1>

    <div class="benefit-list">
      <div class="benefit-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Unlimited HD room creation
      </div>
      <div class="benefit-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        No time limits on group calls
      </div>
      <div class="benefit-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Priority low-latency routing
      </div>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="input-group">
        <label class="input-label">Work Email</label>
        <input type="email" class="pay-input" placeholder="you@company.com" required>
      </div>

      <div class="input-group">
        <label class="input-label">Card Details</label>
        <div class="stripe-mock">
          <span style="color: #475569; font-size: 0.9rem;">1234  5678  9101  1121</span>
          <div style="display: flex; gap: 8px;">
            <span style="color: #475569; font-size: 0.9rem;">MM/YY</span>
            <span style="color: #475569; font-size: 0.9rem;">CVC</span>
          </div>
        </div>
      </div>

      <button type="submit" class="pay-btn">Activate My Account</button>
    </form>

    <p class="trust-line">Cancel anytime. No hidden fees.</p>
  </div>
</div>
